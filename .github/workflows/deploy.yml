name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - move-to-spa

jobs:

  ##############################################
  # DEPLOY MAIN → psearch.dveloxsoft.com
  ##############################################
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js project
        run: pnpm run build

      - name: Create production package.json
        run: |
          node -e "
          const pkg = require('./package.json');
          const prodPkg = {
            name: pkg.name,
            version: pkg.version,
            private: true,
            scripts: { start: 'NODE_ENV=production node server.js' },
            dependencies: pkg.dependencies
          };
          require('fs').writeFileSync('package.json', JSON.stringify(prodPkg, null, 2));
          "

      - name: Clean remote folder
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          script: |
            TARGET=~/psearch.dveloxsoft.com
            cd $TARGET
            for item in *; do
              if [ "$item" != ".htaccess" ] && [ "$item" != ".well-known" ] && [ "$item" != "tmp" ] && [ "$item" != "node_modules" ] && [ "$item" != "apiv1" ]; then
                rm -rf "$item"
              fi
            done

      - name: Upload .next folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: ".next/**"
          target: "~/psearch.dveloxsoft.com/"
          overwrite: true
          rm: false

      - name: Upload public folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: "public/**"
          target: "~/psearch.dveloxsoft.com/public/"
          overwrite: true
          rm: false
          strip_components: 1

      - name: Upload server.js
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: "server.js"
          target: "~/psearch.dveloxsoft.com/"
          overwrite: true

      - name: Upload package.json
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: "package.json"
          target: "~/psearch.dveloxsoft.com/"
          overwrite: true

      - name: Upload pnpm-lock.yaml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: "pnpm-lock.yaml"
          target: "~/psearch.dveloxsoft.com/"
          overwrite: true

      - name: Restart Passenger
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          script: |
            TARGET=~/psearch.dveloxsoft.com
            touch $TARGET/tmp/restart.txt


  ##############################################
  # DEPLOY MOVE-TO-SPA → docs.dveloxsoft.com
  ##############################################
  deploy-docs:
    if: github.ref == 'refs/heads/move-to-spa'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js project
        run: pnpm run build

      - name: Clean remote folder
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          script: |
            TARGET=~/docs.dveloxsoft.com
            cd $TARGET
            for item in *; do
              if [ "$item" != ".htaccess" ] && [ "$item" != ".well-known" ]; then
                rm -rf "$item"
              fi
            done

      - name: Upload static site (out/)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: "out/**"
          target: "~/docs.dveloxsoft.com/"
          overwrite: true
          rm: false
          strip_components: 1
