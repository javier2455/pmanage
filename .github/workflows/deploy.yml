name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js project
        run: pnpm run build

      - name: Prepare standalone deployment
        run: |
          # Copy static assets and public into the standalone folder
          # The standalone output has its own minimal node_modules — no pnpm install needed on server
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Clean remote folder
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          script: |
            TARGET=~/psearch.dveloxsoft.com
            cd $TARGET
            # shopt -s dotglob ensures hidden files (.cache, .pnpm-store, etc.) are also matched
            shopt -s dotglob
            for item in *; do
              case "$item" in
                ".htaccess"|".well-known"|"tmp"|"apiv1") ;;
                *) rm -rf "$item" ;;
              esac
            done
            shopt -u dotglob

      - name: Upload standalone to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          source: ".next/standalone/**"
          target: "~/psearch.dveloxsoft.com/"
          overwrite: true
          rm: false
          strip_components: 2

      - name: Restart Passenger
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_KEY }}
          passphrase: ${{ secrets.CPANEL_PASSPHRASE }}
          script: |
            TARGET=~/psearch.dveloxsoft.com
            touch $TARGET/tmp/restart.txt
